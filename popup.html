<!DOCTYPE html>
<html>
<head>
  <title>Song AI Chat</title>
  <style>
    body { width: 350px; padding: 15px; font-family: 'Segoe UI', sans-serif; background-color: #f9f7ff; }
    h3 { color: #6c5ce7; text-align: center; margin: 0 0 10px 0; }
    
    /* Initial State: Only Analyze button is visible */
    #chat-interface { display: none; margin-top: 10px; }
    
    #chat-container { 
      background: white; border: 1px solid #eee; border-radius: 8px; 
      height: 250px; overflow-y: auto; padding: 10px; margin-bottom: 10px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .msg { padding: 8px 12px; border-radius: 12px; font-size: 0.85em; max-width: 85%; line-height: 1.4; }
    .user-msg { background: #6c5ce7; color: white; align-self: flex-end; }
    .ai-msg { background: #f1f0f0; color: #333; align-self: flex-start; }
    
    .input-area { display: flex; gap: 5px; }
    input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
    
    .primary-btn { 
        background: #6c5ce7; color: white; border: none; padding: 10px; 
        border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%;
    }
    
    .send-btn { background: #6c5ce7; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }

    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6c5ce7; border-radius: 50%; 
              width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin: 10px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .hint { font-size: 0.8em; color: #888; text-align: center; margin-bottom: 10px; }
  </style>
</head>
<body>
  <h3>🎵 Song AI Explorer</h3>
  
  <div id="setup-area">
    <p class="hint">Highlight lyrics on the webpage first!</p>
    <button id="analyze" class="primary-btn">✨ Analyze Lyrics</button>
  </div>

  <div id="loader" class="loader"></div>

  <div id="chat-interface">
    <div id="chat-container"></div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Ask a follow-up...">
      <button id="send-btn" class="send-btn">Send</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
